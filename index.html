<!DOCTYPE html>  <html>  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width,initial-scale=1.0">  
<title>ASPCC Price Compare - ADUSTECH</title> 
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
<style>  
*{  
margin:0;  
padding:0;  
box-sizing:border-box;  
font-family:Arial,sans-serif;  
}  body{
background:#eef3f9;
padding:12px;
color:#333;
}

h1{
background:linear-gradient(135deg,#0d47a1,#1565c0);
color:#fff;
padding:16px;
text-align:center;
border-radius:14px;
font-size:22px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
margin-bottom:8px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#666;
margin-bottom:15px;
}

.search{
width:100%;
padding:13px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
outline:none;
background:#fff;
margin-bottom:15px;
transition:.3s;
}

.search:focus{
border-color:#1565c0;
box-shadow:0 0 8px rgba(21,101,192,.25);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.box{
background:#fff;
border-radius:16px;
padding:22px 12px;
text-align:center;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.08);
transition:.3s;
}

.box:hover{
transform:translateY(-4px);
}

.box b{
display:block;
font-size:18px;
color:#0d47a1;
margin-bottom:6px;
}

.box small{
color:#666;
font-size:13px;
}

.page{
display:none;
}

.page.active{
display:block;
}

.back{
background:#d32f2f;
color:#fff;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-bottom:12px;
}

.item{
background:#fff;
border-left:5px solid #1565c0;
padding:14px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,.08);
}

.item b{
display:block;
font-size:16px;
color:#0d47a1;
margin-bottom:6px;
}

.price{
font-size:18px;
font-weight:bold;
color:#d32f2f;
margin:8px 0;
}

.item p{
font-size:13px;
margin:4px 0;
}

.item a{
color:#0d47a1;
text-decoration:none;
font-weight:bold;
}

.no-data{
background:#fff;
padding:30px;
text-align:center;
border-radius:12px;
color:#777;
}

.footer{
margin-top:25px;
text-align:center;
font-size:12px;
color:#777;
}
</style>

</head>  
<body>  
<div id="cats" class="page active">  <h1>🛒 ASPCC PRICE COMPARE</h1>  <div class="subtitle">  
Compare prices from different shops around ADUSTECH and save your money.  
</div>  
<div class="subtitle" id="catCount">  
Loading categories...  
</div>  <input type="text" class="search" placeholder="🔍 Nema Category..." onkeyup="searchCat(this.value)">  <div class="grid" id="catGrid"></div>  
</div>  
<div id="items" class="page">  
<button class="back" onclick="back()">⬅ BACK</button>  
<input type="text" class="search" placeholder="🔍 Nema Item..." onkeyup="searchItem(this.value)">  
<div id="content"></div>  
</div>  <script src="data.js"></script>  <script>  
let currentCat = '';  
  
function loadCats(){  
let catGrid = document.getElementById('catGrid');  
catGrid.innerHTML = '';  
  
let total = Object.keys(data).length;  
let count = document.getElementById("catCount");  
if(count){  
count.innerHTML = "📂 Total Categories: " + total;  
}  
for(let cat in data){  
  let count = data[cat].length;  
  let name = cat.charAt(0).toUpperCase() + cat.slice(1);  
  catGrid.innerHTML += `
<div class="box" onclick="openCat('${cat}')">
  <b>${name}</b>
  <small>${count} items</small>
</div>`;
}  
}  
  
function searchCat(val){  
  val = val.toLowerCase();  
  let catGrid = document.getElementById('catGrid');  
  catGrid.innerHTML = '';  
  
  let found = 0;  
  
  for(let cat in data){  
    if(cat.toLowerCase().includes(val)){  
      found++;  
      let count = data[cat].length;  
      let name = cat.charAt(0).toUpperCase() + cat.slice(1);  
  
      catGrid.innerHTML += `  
      <div class="box" onclick="openCat('${cat}')">  
        ${name}<br>  
        <small>${count} items</small>  
      </div>`;  
    }  
  }  
  
  if(found == 0){  
    catGrid.innerHTML =  
    '<div class="no-data">❌ No category found</div>';  
  }  
}  
  
  
function openCat(cat){  
currentCat = cat;  
document.getElementById('cats').className = 'page';  
document.getElementById('items').className = 'page active';  
showItems('');  
}  
  
function searchItem(val){  
showItems(val.toLowerCase());  
}  
  
function showItems(searchVal){  
let html = `<h1>${currentCat.toUpperCase()}</h1>`;  
let hasData = false;  
for(let i=0; i<data[currentCat].length; i++){  
  let item = data[currentCat][i];  
  if(searchVal && item.item.toLowerCase().includes(searchVal) == false) continue;  
  hasData = true;  
  html += `<div class="item">  
    <b>${item.item}</b>  
    <p class="price">${item.price}</p>  
    <p>🏪 ${item.shop}</p>  
    <p>📍 ${item.location}</p>  
    <p>📞 <a href="tel:${item.phone}">${item.phone}</a></p>  
  </div>`;  
}  
if(!hasData) html += `<div class="no-data">Babu data tukuna<br><small>Je admin ka cika</small></div>`;  
document.getElementById('content').innerHTML = html;  
}  
  
function back(){  
document.getElementById('items').className = 'page';  
document.getElementById('cats').className = 'page active';  
}  
  
if(typeof data!== 'undefined'){  
  loadCats();  
} else {  
  document.getElementById('catGrid').innerHTML = '<div class="no-data">Babu data.js<br><small>Ka generate code a admin</small></div>';  
}  
</script>  <div class="footer">  
<b>ASPCC Price Compare</b><br>  
Made for ADUSTECH Students ❤️<br>  
Version 1.0  
</div> 
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>
</body>  
</html>
